<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Aakash Gangji Portfolio</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&family=Source+Sans+Pro:wght@300;400;600&display=swap');
        :root {
            --jedi-blue: #4bd5ee;
            --jedi-gold: #ffe81f;
            --dark-space: #000000;
            --mid-space: #0a0a0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--dark-space);
            color: white;
            font-family: 'Source Sans Pro', sans-serif;
            min-height: 100vh;
        }
        h1, h2 { font-family: 'Pathway Gothic One', sans-serif; letter-spacing: 2px; text-transform: uppercase; color: var(--jedi-blue); }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 5%;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(75, 213, 238, 0.3);
            border-bottom: 1px solid rgba(75, 213, 238, 0.2);
        }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo a { display: flex; align-items: center; text-decoration: none; color: var(--jedi-blue); font-family: 'Pathway Gothic One', sans-serif; font-size: 1.2rem; }
        .nav-logo img { height: 36px; width: 36px; object-fit: cover; margin-right: 10px; }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-family: 'Pathway Gothic One', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            border: 2px solid var(--jedi-blue);
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .nav-links a:hover { background: var(--jedi-blue); color: var(--dark-space); box-shadow: 0 0 20px var(--jedi-blue); }
        .stream-page { padding: 80px 20px 40px; max-width: 1200px; margin: 0 auto; }
        .stream-page h1 { margin-bottom: 24px; font-size: 1.8rem; }
        .stream-container {
            background: var(--mid-space);
            border: 1px solid rgba(75, 213, 238, 0.3);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(75, 213, 238, 0.15);
        }
        .stream-container iframe {
            display: block;
            width: 100%;
            height: 500px;
            border: none;
        }
        @media (min-width: 768px) {
            .stream-container iframe { height: 560px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="nav-logo">
                <a href="../index.html">
                    <img src="../images/logo.png" alt="Logo">
                    <span>Portfolio</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="../index.html">← Back to Home</a>
            </div>
        </div>
    </nav>

    <main class="stream-page">
        <h1>Live Stream</h1>
        <div class="stream-container">
            <iframe
                src="https://streamcrichd.com/update/star1hi.php"
                width="100%"
                height="500"
                marginheight="0"
                marginwidth="0"
                scrolling="no"
                frameborder="0"
                allowfullscreen
                allow="encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-presentation"
                referrerpolicy="no-referrer"
            ></iframe>
        </div>
    </main>
</body>
</html>
